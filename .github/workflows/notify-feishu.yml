name: Notify Feishu

on:
  issues:
    types: [opened, closed]
  pull_request:
    types: [opened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build message
        id: build
        run: |
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"

          SKIP=true

          resolve_at() {
            local github_user="$1"
            local feishu_id
            feishu_id=$(jq -r ".\"$github_user\" // empty" .github/feishu-users.json)
            if [ -n "$feishu_id" ]; then
              echo "<at id=$feishu_id></at>"
            else
              echo "@$github_user"
            fi
          }

          if [ "$EVENT" = "issues" ] && [ "$ACTION" = "opened" ]; then
            SKIP=false
            TITLE="📝 新 Issue: ${{ github.event.issue.title }}"
            BODY="仓库: **${{ github.repository }}**  \n作者: ${{ github.event.issue.user.login }}  \n[查看详情](${{ github.event.issue.html_url }})"

          elif [ "$EVENT" = "issues" ] && [ "$ACTION" = "closed" ]; then
            SKIP=false
            TITLE="✅ Issue 已关闭: ${{ github.event.issue.title }}"
            BODY="仓库: **${{ github.repository }}**  \n关闭者: ${{ github.event.sender.login }}  \n[查看详情](${{ github.event.issue.html_url }})"

          elif [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "opened" ]; then
            SKIP=false
            TITLE="🔀 新 PR: ${{ github.event.pull_request.title }}"
            BODY="仓库: **${{ github.repository }}**  \n作者: ${{ github.event.pull_request.user.login }}  \n分支: ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}  \n[查看详情](${{ github.event.pull_request.html_url }})"
            # @ me: 从映射文件解析 notify-me 的 GitHub 用户 → 飞书 ID
            AT_ME=$(resolve_at "${{ vars.FEISHU_NOTIFY_ME }}")
            if [ -n "$AT_ME" ]; then
              BODY="$BODY  \n$AT_ME"
            fi

          elif [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "closed" ] && [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            SKIP=false
            PR_AUTHOR="${{ github.event.pull_request.user.login }}"
            AT_PR_AUTHOR=$(resolve_at "$PR_AUTHOR")
            TITLE="🎉 PR 已合并: ${{ github.event.pull_request.title }}"
            BODY="仓库: **${{ github.repository }}**  \n合并者: ${{ github.event.pull_request.merged_by.login }}  \n[查看详情](${{ github.event.pull_request.html_url }})  \n$AT_PR_AUTHOR"
          fi

          echo "skip=$SKIP" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          # Use delimiter for multiline output
          {
            echo "body<<BODY_EOF"
            echo -e "$BODY"
            echo "BODY_EOF"
          } >> $GITHUB_OUTPUT

      - name: Send to Feishu
        if: steps.build.outputs.skip != 'true'
        env:
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          curl -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
            \"msg_type\": \"interactive\",
            \"card\": {
              \"header\": {
                \"title\": { \"content\": \"${{ steps.build.outputs.title }}\", \"tag\": \"plain_text\" },
                \"template\": \"blue\"
              },
              \"elements\": [
                { \"tag\": \"markdown\", \"content\": \"${{ steps.build.outputs.body }}\" }
              ]
            }
          }"
